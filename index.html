<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  line-height: 1.6;
  color: #333;
  background: #f7fbff;
}

/* ===== ヒーロー ===== */
header {
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");

  background-position: center;
  height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  color: white;
}

/* ロゴをページ上端中央に固定 */
.header-logo {
  width: 200px;        /* ロゴサイズ */
  margin-top: 10px;   /* 上端から少し余白 */
  animation: float 4s ease-in-out infinite;
  z-index: 10;
}

/* ヒーロー内文字 */
.hero-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header h1 {
  font-size: 2rem;
  margin-bottom: 10px;
}

header p {
  margin-bottom: 20px;
}

.btn {
  display: inline-block;
  background: #00aaff;
  color: white;
  padding: 12px 20px;
  border-radius: 30px;
  text-decoration: none;
}

/* ===== セクション共通 ===== */
section {
  padding: 60px 20px;
}

.section-title {
  text-align: center;
  font-size: 1.6rem;
  margin-bottom: 30px;
}

/* ===== プラン（横スクロール） ===== */
.plan-scroll {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.plan-scroll::-webkit-scrollbar {
  display: none;
}

.plan-card {
  min-width: 75%;
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  position: relative;
  transition: 0.3s;
}

.plan-card:active {
  transform: scale(0.96);
}

.plan-tag {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #00aaff;
  color: white;
  font-size: 0.7rem;
  padding: 5px 10px;
  border-radius: 20px;
}

.price {
  margin-top: 15px;
  font-size: 1.4rem;
  color: #00aaff;
  font-weight: bold;
}

/* ===== 流れ（タイムライン） ===== */
.flow {
  background: #f0f8ff;
}

.timeline {
  position: relative;
  margin-left: 10px;
  padding-left: 20px;
  border-left: 2px solid #00aaff;
}

.step {
  margin-bottom: 25px;
  position: relative;
}

.step span {
  position: absolute;
  left: -18px;
  top: 0;
  background: #00aaff;
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.step p {
  background: white;
  padding: 12px 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* ===== CTA固定ボタン ===== */
.fixed-btn {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #00aaff;
  color: white;
  padding: 14px 25px;
  border-radius: 30px;
  text-decoration: none;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  z-index: 10;
}

/* ===== フッター ===== */
footer {
  text-align: center;
  padding: 30px 20px;
  background: #111;
  color: #aaa;
  font-size: 0.8rem;
}
</style>
